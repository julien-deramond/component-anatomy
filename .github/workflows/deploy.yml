name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow triggering a deployment manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment; queue new ones, don't cancel in-flight.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:packages

      - name: Build Astro docs site
        run: pnpm --filter examples-astro build
        env:
          SITE_URL: https://julien-deramond.github.io
          BASE_PATH: /component-anatomy

      - name: Build Storybook example
        run: pnpm --filter examples-storybook build

      - name: Nest Storybook under /storybook/
        run: |
          mkdir -p examples/astro/dist/storybook
          cp -r examples/storybook/storybook-static/* examples/astro/dist/storybook/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: examples/astro/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
